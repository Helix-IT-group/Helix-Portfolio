<script>

let sb=null;if(USE_SB){sb=window.supabase.createClient(SB_URL,SB_KEY);}
const DEF={settings:{companyName:'Helix Tech',email:'hello@helixtech.io',phone:'+1 (415) 555-0192',address:'42 Innovation Drive, Suite 300<br>San Francisco, CA 94107',heroTitle:'Building the<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-emerald-300 to-emerald-500">digital future</span>',heroSub:'We engineer scalable IT solutions, craft immersive digital experiences, and empower businesses to thrive in an ever-evolving technological landscape.',heroBadge:'Trusted by 200+ Businesses',aboutP1:'Founded in 2012, Helix Tech has grown from a small dev shop into a full-service IT partner trusted by startups and Fortune 500 companies alike.',aboutP2:'Our multidisciplinary team of 80+ engineers, designers, and strategists work at the intersection of innovation and pragmatism.',aboutYears:'12+',stats:[{n:'200',l:'Clients Served'},{n:'500',l:'Projects Done'},{n:'12',l:'Years Experience'},{n:'99',l:'% Satisfaction'}],partners:['Microsoft','AWS','Google Cloud','Salesforce','Oracle','SAP','VMware','Cisco'],footerDesc:"Engineering the digital future. We build, secure, and scale the technology that powers tomorrow's businesses."},services:[{id:'s1',icon:'cloud',title:'Cloud Solutions',desc:'Migrate, manage, and optimize your cloud infrastructure on AWS, Azure, or GCP with zero downtime.'},{id:'s2',icon:'shield-check',title:'Cybersecurity',desc:'Protect your assets with penetration testing, SIEM monitoring, compliance audits, and incident response.'},{id:'s3',icon:'code-2',title:'Custom Software',desc:'Tailor-made applications built with modern stacks — React, Next.js, Node, Python — designed for scale.'},{id:'s4',icon:'brain-circuit',title:'AI & Machine Learning',desc:'Leverage predictive analytics, NLP, computer vision, and LLM integrations to automate and innovate.'},{id:'s5',icon:'smartphone',title:'Mobile Development',desc:'Native and cross-platform apps for iOS and Android using React Native, Flutter, and Swift.'},{id:'s6',icon:'bar-chart-3',title:'Data Analytics',desc:'Transform raw data into actionable insights with BI dashboards, ETL pipelines, and data warehousing.'}],portfolio:[{id:'p1',title:'FinTrack Dashboard',desc:'Real-time financial analytics platform processing 2M+ transactions daily.',category:'web',img:'https://picsum.photos/seed/helix-proj1/600/340.jpg',color:'emerald',tags:['React','Node.js','PostgreSQL']},{id:'p2',title:'MediCare Connect',desc:'Telehealth platform with video consultations and e-prescriptions.',category:'mobile',img:'https://picsum.photos/seed/helix-proj2/600/340.jpg',color:'blue',tags:['Flutter','Firebase','WebRTC']},{id:'p3',title:'LogiSmart AI',desc:'AI-driven logistics optimization reducing delivery costs by 34%.',category:'cloud',img:'https://picsum.photos/seed/helix-proj3/600/340.jpg',color:'purple',tags:['Python','TensorFlow','AWS']},{id:'p4',title:'EduVerse LMS',desc:'Gamified learning platform serving 500K+ students with adaptive paths.',category:'web',img:'https://picsum.photos/seed/helix-proj4/600/340.jpg',color:'emerald',tags:['Next.js','GraphQL','MongoDB']},{id:'p5',title:'SecureVault',desc:'Zero-trust cloud security platform with AI threat detection.',category:'cloud',img:'https://picsum.photos/seed/helix-proj5/600/340.jpg',color:'purple',tags:['Go','K8s','Azure']},{id:'p6',title:'QuickBite Delivery',desc:'Food delivery app with real-time tracking serving 100K+ daily orders.',category:'mobile',img:'https://picsum.photos/seed/helix-proj6/600/340.jpg',color:'blue',tags:['React Native','Redis','GCP']}],testimonials:[{id:'t1',name:'Sarah Richardson',role:'CTO, FinanceFlow Inc.',initials:'SR',gradient:'from-emerald-400 to-emerald-600',textColor:'text-black',stars:5,text:'Helix Tech transformed our legacy systems into a modern cloud architecture. Zero downtime, 40% cost reduction.'},{id:'t2',name:'Marcus Kim',role:'VP Engineering, QuickBite',initials:'MK',gradient:'from-blue-400 to-blue-600',textColor:'text-white',stars:5,text:'The AI recommendation engine increased our order value by 28%. Their ML team is world-class.'},{id:'t3',name:'Aisha Patel',role:'CEO, MediCare Connect',initials:'AP',gradient:'from-purple-400 to-purple-600',textColor:'text-white',stars:5,text:'From concept to App Store in 4 months. The Flutter app is buttery smooth.'}],messages:[]};
let C=JSON.parse(JSON.stringify(DEF)),isLogged=false;
const svcToDb=s=>({id:s.id,icon:s.icon,title:s.title,description:s.desc,sort_order:0}),svcFromDb=r=>({id:r.id,icon:r.icon,title:r.title,desc:r.description}),ptToDb=p=>({id:p.id,title:p.title,description:p.desc,category:p.category,image_url:p.img,badge_color:p.color,tags:p.tags,sort_order:0}),ptFromDb=r=>({id:r.id,title:r.title,desc:r.description,category:r.category,img:r.image_url,color:r.badge_color,tags:r.tags||[]}),tmToDb=t=>({id:t.id,name:t.name,role:t.role,initials:t.initials,gradient:t.gradient,text_color:t.textColor,stars:t.stars,quote:t.text,sort_order:0}),tmFromDb=r=>({id:r.id,name:r.name,role:r.role,initials:r.initials,gradient:r.gradient,textColor:r.text_color,stars:r.stars,text:r.quote}),msgToDb=m=>({id:m.id,first_name:m.firstName,last_name:m.lastName,email:m.email,company:m.company||null,service:m.service||null,message:m.message}),msgFromDb=r=>({id:r.id,firstName:r.first_name,lastName:r.last_name,email:r.email,company:r.company,service:r.service,message:r.message,date:r.created_at});
async function loadAll(){if(USE_SB){try{const[sR,svR,pR,tR,mR]=await Promise.all([sb.from('site_settings').select('data').eq('id',1).single(),sb.from('services').select('*').order('sort_order'),sb.from('portfolio').select('*').order('sort_order'),sb.from('testimonials').select('*').order('sort_order'),sb.from('messages').select('*').order('created_at',{ascending:false})]);C.settings=sR.data?.data||DEF.settings;C.services=(svR.data||[]).map(svcFromDb);C.portfolio=(pR.data||[]).map(ptFromDb);C.testimonials=(tR.data||[]).map(tmFromDb);C.messages=(mR.data||[]).map(msgFromDb);}catch(e){console.error(e);}}else{try{const s=JSON.parse(localStorage.getItem('helix_data'));if(s&&typeof s==='object')C=s;}catch(e){}}}
function saveLocal(){localStorage.setItem('helix_data',JSON.stringify(C));}
function uid(){return 'i'+Date.now()+Math.random().toString(36).slice(2,6);}
function toast(m,e){const t=document.getElementById('toast'),s=document.getElementById('toast-msg');if(!t||!s){console.warn('Toast element missing, falling back to alert:',m);if(e){alert('ERROR: '+m);}else{alert(m);}return;}s.textContent=m;t.style.borderColor=e?'rgba(239,68,68,.3)':'rgba(16,185,129,.3)';const icon=t.querySelector('i');if(icon){icon.style.color=e?'#f87171':'#34d399';}t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
function flashSuccess(){const c=document.getElementById('adm-c');c.classList.add('success-flash');setTimeout(()=>c.classList.remove('success-flash'),600);}
function flashDelete(){const c=document.getElementById('adm-c');c.classList.add('delete-flash');setTimeout(()=>c.classList.remove('delete-flash'),600);}
function openM(h){document.getElementById('modal-c').innerHTML=h;document.getElementById('modal').classList.add('act');lucide.createIcons();}function closeModal(){document.getElementById('modal').classList.remove('act');}
let cfmCb=null;function showCfm(m,cb){document.getElementById('cfm-msg').textContent=m;cfmCb=cb;document.getElementById('cfm').classList.add('act');lucide.createIcons();}function closeCfm(){document.getElementById('cfm').classList.remove('act');cfmCb=null;}
document.getElementById('cfm-btn').onclick=()=>{if(cfmCb)cfmCb();closeCfm();};
function showLogin(){document.getElementById('login-ov').classList.remove('hidden');document.getElementById('login-hint').textContent=USE_SB?'Sign in with your Supabase account':'Enter credentials (admin / admin123)';document.getElementById('l-user').type=USE_SB?'email':'text';document.getElementById('l-user').placeholder=USE_SB?'you@email.com':'admin';if(!USE_SB)document.getElementById('l-user').value='admin';document.getElementById('l-user').focus();}

async function doLogin(e){e.preventDefault();const u=document.getElementById('l-user').value.trim(),p=document.getElementById('l-pass').value,errEl=document.getElementById('l-err'),btn=document.getElementById('l-btn');btn.disabled=true;btn.textContent='Signing in...';errEl.classList.add('hidden');if(USE_SB){const{data,error}=await sb.auth.signInWithPassword({email:u,password:p});btn.disabled=false;btn.textContent='Sign In';if(error){errEl.textContent=error.message;errEl.classList.remove('hidden');return;}isLogged=true;document.getElementById('adm-user').textContent=data.user?.email||'Admin';}else{await new Promise(r=>setTimeout(r,300));const d=C.auth||{username:'admin',password:'admin123'};if(u!==d.username||p!==d.password){btn.disabled=false;btn.textContent='Sign In';errEl.textContent='Invalid credentials';errEl.classList.remove('hidden');return;}isLogged=true;}hideLogin();aNav('dashboard');}
async function doLogout(){if(USE_SB)await sb.auth.signOut();isLogged=false;goHome();}
function goHome(){window.location.href='index.html';}
function togSB(){document.getElementById('adm-sb').classList.toggle('-translate-x-full');document.getElementById('sb-ov').classList.toggle('hidden');}
let curPage='dashboard';function aNav(p){curPage=p;document.querySelectorAll('.sl[data-p]').forEach(l=>l.classList.toggle('act',l.dataset.p===p));document.getElementById('adm-title').textContent={dashboard:'Dashboard',services:'Services',portfolio:'Portfolio',testimonials:'Testimonials',messages:'Messages',settings:'Settings'}[p];const mc=C.messages.length,b=document.getElementById('msg-b');if(mc>0){b.textContent=mc;b.classList.remove('hidden');b.classList.add('msg-pulse');}else{b.classList.add('hidden');b.classList.remove('msg-pulse');}if(!document.getElementById('adm-sb').classList.contains('-translate-x-full')&&window.innerWidth<1024)togSB();const c=document.getElementById('adm-c');if(p==='dashboard')rDash(c);else if(p==='services')rSvc(c);else if(p==='portfolio')rPort(c);else if(p==='testimonials')rTm(c);else if(p==='messages')rMsg(c);else if(p==='settings')rSet(c);lucide.createIcons();}
function rDash(c){c.innerHTML=`<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">${[['Services',C.services.length,'cloud','emerald'],['Projects',C.portfolio.length,'briefcase','blue'],['Testimonials',C.testimonials.length,'message-square','purple'],['Messages',C.messages.length,'inbox','amber']].map(([l,n,ic,cl])=>`<div class="ac"><div class="flex items-center justify-between mb-3"><span class="text-xs text-neutral-500 uppercase tracking-wider">${l}</span><div class="w-8 h-8 rounded-lg bg-${cl}-500/10 flex items-center justify-center"><i data-lucide="${ic}" class="w-4 h-4 text-${cl}-400"></i></div></div><div class="text-2xl font-bold">${n}</div></div>`).join('')}</div><div class="ac mb-8"><h3 class="text-sm font-semibold mb-4">Recent Messages</h3>${C.messages.length===0?'<p class="text-sm text-neutral-500">No messages yet.</p>':`<div class="overflow-x-auto"><table class="at"><thead><tr><th>Name</th><th>Email</th><th>Service</th><th>Date</th></tr></thead><tbody>${C.messages.slice(0,5).map(m=>`<tr><td class="font-medium">${m.firstName} ${m.lastName}</td><td class="text-neutral-400">${m.email}</td><td><span class="px-2 py-0.5 text-[11px] rounded bg-white/5">${m.service||'—'}</span></td><td class="text-neutral-500 text-xs">${new Date(m.date).toLocaleDateString()}</td></tr>`).join('')}</tbody></table></div>`}</div><div class="grid grid-cols-1 lg:grid-cols-2 gap-4"><div class="ac"><h3 class="text-sm font-semibold mb-4">Quick Actions</h3><div class="grid grid-cols-2 gap-3"><button onclick="aNav('services');setTimeout(()=>openSF(),100)" class="bs justify-center text-xs"><i data-lucide="plus" class="w-3.5 h-3.5"></i>Add Service</button><button onclick="aNav('portfolio');setTimeout(()=>openPF(),100)" class="bs justify-center text-xs"><i data-lucide="plus" class="w-3.5 h-3.5"></i>Add Project</button><button onclick="aNav('testimonials');setTimeout(()=>openTF(),100)" class="bs justify-center text-xs"><i data-lucide="plus" class="w-3.5 h-3.5"></i>Add Review</button><button onclick="aNav('settings')" class="bs justify-center text-xs"><i data-lucide="settings" class="w-3.5 h-3.5"></i>Settings</button></div></div><div class="ac"><h3 class="text-sm font-semibold mb-4">Connection</h3><div class="flex items-center gap-2 text-sm"><span class="w-2 h-2 rounded-full ${USE_SB?'bg-emerald-400':'bg-amber-400'}"></span><span class="text-neutral-400">${USE_SB?'Connected to Supabase':'Using localStorage (local only)'}</span></div></div></div>`;}
const ICONS=['cloud','shield-check','code-2','brain-circuit','smartphone','bar-chart-3','database','globe','cpu','wifi','lock','zap','monitor','server','git-branch','layers'];
function rSvc(c){c.innerHTML=`<div class="flex items-center justify-between mb-6"><p class="text-sm text-neutral-400">${C.services.length} services</p><button class="bp" onclick="openSF()"><i data-lucide="plus" class="w-4 h-4"></i>Add Service</button></div><div class="space-y-3">${C.services.map(s=>`<div class="ac flex items-center gap-4"><div class="w-10 h-10 rounded-lg bg-emerald-500/10 flex items-center justify-center flex-shrink-0"><i data-lucide="${s.icon}" class="w-5 h-5 text-emerald-400"></i></div><div class="flex-1 min-w-0"><div class="font-medium text-sm truncate">${s.title}</div><div class="text-xs text-neutral-500 truncate">${s.desc}</div></div><div class="flex gap-2 flex-shrink-0"><button onclick="openSF('${s.id}')" class="bs text-xs px-3 py-1.5"><i data-lucide="pencil" class="w-3 h-3"></i></button><button onclick="delS('${s.id}')" class="bd text-xs px-3 py-1.5"><i data-lucide="trash-2" class="w-3 h-3"></i></button></div></div>`).join('')}</div>`;}
function openSF(id){const s=id?C.services.find(x=>x.id===id):null;openM(`<div class="p-6"><h3 class="text-lg font-semibold mb-5">${s?'Edit':'Add'} Service</h3><form onsubmit="saveS(event,'${id||''}')" class="space-y-4"><div><label class="fl">Title</label><input class="fi" name="title" required value="${s?s.title:''}"></div><div><label class="fl">Icon</label><select class="fi" name="icon">${ICONS.map(i=>`<option value="${i}" ${s&&s.icon===i?'selected':''}>${i}</option>`).join('')}</select></div><div><label class="fl">Description</label><textarea class="fi resize-none" name="desc" rows="3" required>${s?s.desc:''}</textarea></div><div class="flex gap-3 justify-end pt-2"><button type="button" class="bs" onclick="closeModal()">Cancel</button><button type="submit" class="bp" id="sf-btn">${s?'Update':'Add'}</button></div></form></div>`);}
async function saveS(e,id){e.preventDefault();const f=e.target,btn=document.getElementById('sf-btn');btn.disabled=true;btn.textContent='Saving...';const obj={id:id||uid(),icon:f.icon.value,title:f.title.value.trim(),desc:f.desc.value.trim()};if(USE_SB){const{error}=id?await sb.from('services').update(svcToDb(obj)).eq('id',id):await sb.from('services').insert(svcToDb(obj));if(error){toast(error.message,true);btn.disabled=false;btn.textContent=id?'Update':'Add';return;}}if(id){const i=C.services.findIndex(x=>x.id===id);if(i>-1)C.services[i]=obj;}else C.services.push(obj);if(!USE_SB)saveLocal();closeModal();aNav('services');toast(id?'Updated':'Added');flashSuccess();}
function delS(id){showCfm('Delete this service?',async()=>{if(USE_SB){const{error}=await sb.from('services').delete().eq('id',id);if(error){toast(error.message,true);return;}}C.services=C.services.filter(x=>x.id!==id);if(!USE_SB)saveLocal();aNav('services');toast('Deleted');flashDelete();});}
function rPort(c){const cl={web:'Web App',mobile:'Mobile',cloud:'Cloud & AI'};c.innerHTML=`<div class="flex items-center justify-between mb-6"><p class="text-sm text-neutral-400">${C.portfolio.length} projects</p><button class="bp" onclick="openPF()"><i data-lucide="plus" class="w-4 h-4"></i>Add Project</button></div><div class="overflow-x-auto"><table class="at"><thead><tr><th>Preview</th><th>Title</th><th>Category</th><th>Tags</th><th class="text-right">Actions</th></tr></thead><tbody>${C.portfolio.map(p=>`<tr><td><div class="w-16 h-10 rounded-lg overflow-hidden bg-white/5"><img src="${p.img}" class="w-full h-full object-cover" onerror="this.src='https://picsum.photos/seed/fb/160/100.jpg'"></div></td><td class="font-medium">${p.title}</td><td><span class="px-2 py-0.5 text-[11px] rounded bg-white/5">${cl[p.category]||p.category}</span></td><td class="text-xs text-neutral-500">${p.tags.join(', ')}</td><td class="text-right"><div class="flex items-center justify-end gap-2"><button onclick="openPF('${p.id}')" class="bs text-xs px-3 py-1.5"><i data-lucide="pencil" class="w-3 h-3"></i></button><button onclick="delP('${p.id}')" class="bd text-xs px-3 py-1.5"><i data-lucide="trash-2" class="w-3 h-3"></i></button></div></td></tr>`).join('')}</tbody></table></div>`;}
function openPF(id){const p=id?C.portfolio.find(x=>x.id===id):null;openM(`<div class="p-6"><h3 class="text-lg font-semibold mb-5">${p?'Edit':'Add'} Project</h3><form onsubmit="saveP(event,'${id||''}')" class="space-y-4"><div class="grid grid-cols-2 gap-4"><div><label class="fl">Title</label><input class="fi" name="title" required value="${p?p.title:''}"></div><div><label class="fl">Category</label><select class="fi" name="category"><option value="web" ${p&&p.category==='web'?'selected':''}>Web App</option><option value="mobile" ${p&&p.category==='mobile'?'selected':''}>Mobile</option><option value="cloud" ${p&&p.category==='cloud'?'selected':''}>Cloud & AI</option></select></div></div><div><label class="fl">Image Upload</label><input type="file" class="fi" name="imgFile" accept="image/*"><small class="text-neutral-500 text-xs">Upload a new image or enter URL below</small></div><div><label class="fl">Image URL</label><input class="fi" name="img" value="${p?p.img:''}" placeholder="https://... or leave blank if uploading file"></div><div><label class="fl">Badge Color</label><select class="fi" name="color"><option value="emerald" ${p&&p.color==='emerald'?'selected':''}>Emerald</option><option value="blue" ${p&&p.color==='blue'?'selected':''}>Blue</option><option value="purple" ${p&&p.color==='purple'?'selected':''}>Purple</option></select></div><div><label class="fl">Description</label><textarea class="fi resize-none" name="desc" rows="2" required>${p?p.desc:''}</textarea></div><div><label class="fl">Tags (comma separated)</label><input class="fi" name="tags" value="${p?p.tags.join(', '):''}"></div><div class="flex gap-3 justify-end pt-2"><button type="button" class="bs" onclick="closeModal()">Cancel</button><button type="submit" class="bp" id="pf-btn">${p?'Update':'Add'}</button></div></form></div>`);}
async function saveP(e,id){e.preventDefault();const f=e.target,btn=document.getElementById('pf-btn');btn.disabled=true;btn.textContent='Uploading...';try{let imgUrl=f.img.value.trim();if(f.imgFile.files[0]){if(!USE_SB){throw new Error('File upload requires Supabase mode. Use an image URL or enable Supabase.');}const file=f.imgFile.files[0];const fileName=`${Date.now()}-${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;const{data,error}=await sb.storage.from('portfolio').upload(fileName,file);if(error){throw error;}const pub=sb.storage.from('portfolio').getPublicUrl(fileName);if(pub.error){throw pub.error;}imgUrl=pub.data?.publicUrl; if(!imgUrl){throw new Error('Unable to generate public URL for uploaded image.');}}if(!imgUrl){toast('Image URL or file is required',true);return;}btn.textContent='Saving...';const obj={id:id||uid(),title:f.title.value.trim(),desc:f.desc.value.trim(),category:f.category.value,img:imgUrl,color:f.color.value,tags:f.tags.value.split(',').map(t=>t.trim()).filter(Boolean)};if(USE_SB){const{error}=id?await sb.from('portfolio').update(ptToDb(obj)).eq('id',id):await sb.from('portfolio').insert(ptToDb(obj));if(error){throw error;}}if(id){const i=C.portfolio.findIndex(x=>x.id===id);if(i>-1)C.portfolio[i]=obj;}else C.portfolio.push(obj);if(!USE_SB)saveLocal();closeModal();aNav('portfolio');toast(id?'Updated':'Added');flashSuccess();}catch(err){toast(err?.message||'Upload failed',true);}finally{btn.disabled=false;btn.textContent=id?'Update':'Add';}}function delP(id){showCfm('Delete this project?',async()=>{if(USE_SB){const{error}=await sb.from('portfolio').delete().eq('id',id);if(error){toast(error.message,true);return;}}C.portfolio=C.portfolio.filter(x=>x.id!==id);if(!USE_SB)saveLocal();aNav('portfolio');toast('Deleted');flashDelete();});}
function rTm(c){c.innerHTML=`<div class="flex items-center justify-between mb-6"><p class="text-sm text-neutral-400">${C.testimonials.length} testimonials</p><button class="bp" onclick="openTF()"><i data-lucide="plus" class="w-4 h-4"></i>Add Testimonial</button></div><div class="space-y-3">${C.testimonials.map(t=>`<div class="ac flex items-center gap-4"><div class="w-10 h-10 rounded-full bg-gradient-to-br ${t.gradient} flex items-center justify-center text-sm font-bold ${t.textColor} flex-shrink-0">${t.initials}</div><div class="flex-1 min-w-0"><div class="font-medium text-sm">${t.name} <span class="text-neutral-500 font-normal">— ${t.role}</span></div><div class="text-xs text-neutral-500 truncate">${t.text}</div></div><div class="flex gap-2 flex-shrink-0"><button onclick="openTF('${t.id}')" class="bs text-xs px-3 py-1.5"><i data-lucide="pencil" class="w-3 h-3"></i></button><button onclick="delT('${t.id}')" class="bd text-xs px-3 py-1.5"><i data-lucide="trash-2" class="w-3 h-3"></i></button></div></div>`).join('')}</div>`;}
function openTF(id){const t=id?C.testimonials.find(x=>x.id===id):null;openM(`<div class="p-6"><h3 class="text-lg font-semibold mb-5">${t?'Edit':'Add'} Testimonial</h3><form onsubmit="saveT(event,'${id||''}')" class="space-y-4"><div class="grid grid-cols-2 gap-4"><div><label class="fl">Name</label><input class="fi" name="name" required value="${t?t.name:''}"></div><div><label class="fl">Role</label><input class="fi" name="role" required value="${t?t.role:''}"></div></div><div class="grid grid-cols-3 gap-4"><div><label class="fl">Initials</label><input class="fi" name="initials" required maxlength="3" value="${t?t.initials:''}"></div><div><label class="fl">Stars</label><select class="fi" name="stars">${[1,2,3,4,5].map(n=>`<option value="${n}" ${t&&t.stars===n?'selected':''}>${n}</option>`).join('')}</select></div><div><label class="fl">Gradient</label><select class="fi" name="gradient"><option value="from-emerald-400 to-emerald-600" ${t&&t.gradient.includes('emerald')?'selected':''}>Emerald</option><option value="from-blue-400 to-blue-600" ${t&&t.gradient.includes('blue')?'selected':''}>Blue</option><option value="from-purple-400 to-purple-600" ${t&&t.gradient.includes('purple')?'selected':''}>Purple</option><option value="from-amber-400 to-amber-600" ${t&&t.gradient.includes('amber')?'selected':''}>Amber</option></select></div></div><div><label class="fl">Quote</label><textarea class="fi resize-none" name="text" rows="3" required>${t?t.text:''}</textarea></div><div class="flex gap-3 justify-end pt-2"><button type="button" class="bs" onclick="closeModal()">Cancel</button><button type="submit" class="bp" id="tf-btn">${t?'Update':'Add'}</button></div></form></div>`);}
async function saveT(e,id){e.preventDefault();const f=e.target,btn=document.getElementById('tf-btn');btn.disabled=true;btn.textContent='Saving...';const g=f.gradient.value,tc=g.includes('emerald')?'text-black':'text-white',obj={id:id||uid(),name:f.name.value.trim(),role:f.role.value.trim(),initials:f.initials.value.trim(),stars:parseInt(f.stars.value),gradient:g,textColor:tc,text:f.text.value.trim()};if(USE_SB){const{error}=id?await sb.from('testimonials').update(tmToDb(obj)).eq('id',id):await sb.from('testimonials').insert(tmToDb(obj));if(error){toast(error.message,true);btn.disabled=false;btn.textContent=id?'Update':'Add';return;}}if(id){const i=C.testimonials.findIndex(x=>x.id===id);if(i>-1)C.testimonials[i]=obj;}else C.testimonials.push(obj);if(!USE_SB)saveLocal();closeModal();aNav('testimonials');toast(id?'Updated':'Added');flashSuccess();}
function delT(id){showCfm('Delete this testimonial?',async()=>{if(USE_SB){const{error}=await sb.from('testimonials').delete().eq('id',id);if(error){toast(error.message,true);return;}}C.testimonials=C.testimonials.filter(x=>x.id!==id);if(!USE_SB)saveLocal();aNav('testimonials');toast('Deleted');flashDelete();});}
function rMsg(c){if(!C.messages.length){c.innerHTML=`<div class="text-center py-20"><i data-lucide="inbox" class="w-12 h-12 text-neutral-700 mx-auto mb-4"></i><p class="text-neutral-500">No messages yet.</p></div>`;return;}c.innerHTML=`<div class="flex items-center justify-between mb-6"><p class="text-sm text-neutral-400">${C.messages.length} messages</p><button class="bd" onclick="clrMsg()"><i data-lucide="trash-2" class="w-4 h-4"></i>Clear All</button></div><div class="space-y-3">${C.messages.map(m=>`<div class="ac"><div class="flex items-start justify-between mb-3"><div><div class="font-medium text-sm">${m.firstName} ${m.lastName}${m.company?' <span class="text-neutral-500 font-normal">· '+m.company+'</span>':''}</div><div class="text-xs text-neutral-500">${m.email} · ${new Date(m.date).toLocaleString()}</div></div>${m.service?`<span class="px-2 py-0.5 text-[11px] rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">${m.service}</span>`:''}</div><p class="text-sm text-neutral-300 leading-relaxed bg-white/[0.02] rounded-lg p-3">${m.message}</p></div>`).join('')}</div>`;document.getElementById('msg-b').classList.remove('msg-pulse');}
function clrMsg(){showCfm('Delete all messages?',async()=>{if(USE_SB){const{error}=await sb.from('messages').delete().neq('id','00000000-0000-0000-0000-000000000000');if(error){toast(error.message,true);return;}}C.messages=[];if(!USE_SB)saveLocal();aNav('messages');toast('Cleared');flashDelete();});}
function rSet(c){const s=C.settings;c.innerHTML=`<div class="max-w-2xl"><form onsubmit="saveSet(event)" class="space-y-6"><div class="ac space-y-4"><h3 class="text-sm font-semibold mb-2">Company Info</h3><div class="grid grid-cols-2 gap-4"><div><label class="fl">Company Name</label><input class="fi" name="companyName" required value="${s.companyName}"></div><div><label class="fl">Email</label><input class="fi" name="email" required value="${s.email}"></div></div><div><label class="fl">Phone</label><input class="fi" name="phone" value="${s.phone}"></div><div><label class="fl">Address (HTML ok)</label><textarea class="fi resize-none" name="address" rows="2">${s.address.replace(/<br>/g,'\n')}</textarea></div><div><label class="fl">Footer Description</label><textarea class="fi resize-none" name="footerDesc" rows="2">${s.footerDesc}</textarea></div></div><div class="ac space-y-4"><h3 class="text-sm font-semibold mb-2">Hero Section</h3><div><label class="fl">Badge Text</label><input class="fi" name="heroBadge" value="${s.heroBadge}"></div><div><label class="fl">Title (HTML — use span for gradient)</label><textarea class="fi resize-none" name="heroTitle" rows="2">${s.heroTitle.replace(/<br>/g,'\n')}</textarea></div><div><label class="fl">Subtitle</label><textarea class="fi resize-none" name="heroSub" rows="2">${s.heroSub}</textarea></div></div><div class="ac space-y-4"><h3 class="text-sm font-semibold mb-2">About Section</h3><div><label class="fl">Years Display</label><input class="fi" name="aboutYears" value="${s.aboutYears}"></div><div><label class="fl">Paragraph 1</label><textarea class="fi resize-none" name="aboutP1" rows="2">${s.aboutP1}</textarea></div><div><label class="fl">Paragraph 2</label><textarea class="fi resize-none" name="aboutP2" rows="2">${s.aboutP2}</textarea></div></div><div class="ac space-y-4"><h3 class="text-sm font-semibold mb-2">Stats <span class="text-neutral-500 font-normal">(number|label per line)</span></h3><div><textarea class="fi resize-none font-mono text-xs" name="stats" rows="4">${s.stats.map(st=>st.n+'|'+st.l).join('\n')}</textarea></div></div><div class="ac space-y-4"><h3 class="text-sm font-semibold mb-2">Partner Logos <span class="text-neutral-500 font-normal">(one per line)</span></h3><div><textarea class="fi resize-none font-mono text-xs" name="partners" rows="4">${s.partners.join('\n')}</textarea></div></div><div class="ac space-y-4"><h3 class="text-sm font-semibold mb-2">Change Password</h3><div><label class="fl">New Password</label><input type="password" class="fi" name="newPass" placeholder="Leave blank to keep current"></div></div><button type="submit" class="bp px-8 py-3"><i data-lucide="save" class="w-4 h-4"></i>Save All Settings</button></form></div>`;}
async function saveSet(e){e.preventDefault();const f=e.target,d=C.settings,s=d.settings||d;d.companyName=f.companyName.value.trim();d.email=f.email.value.trim();d.phone=f.phone.value.trim();d.address=f.address.value.trim().replace(/\n/g,'<br>');d.footerDesc=f.footerDesc.value.trim();d.heroBadge=f.heroBadge.value.trim();d.heroTitle=f.heroTitle.value.trim().replace(/\n/g,'<br>');d.heroSub=f.heroSub.value.trim();d.aboutYears=f.aboutYears.value.trim();d.aboutP1=f.aboutP1.value.trim();d.aboutP2=f.aboutP2.value.trim();d.stats=f.stats.value.split('\n').filter(l=>l.includes('|')).map(l=>{const[n,lbl]=l.split('|');return{n:n.trim(),l:lbl.trim()};});d.partners=f.partners.value.split('\n').map(l=>l.trim()).filter(Boolean);if(USE_SB){const{error}=await sb.from('site_settings').update({data:d}).eq('id',1);if(error){toast(error.message,true);return;}}else{if(f.newPass.value.trim())d.auth=d.auth||{};d.auth.password=f.newPass.value.trim();saveLocal();}sd(C);aNav('settings');toast('Settings saved!');flashSuccess();}
async function checkAuth(){if(USE_SB){const{data}=await sb.auth.getUser();if(data.user){isLogged=true;document.getElementById('adm-user').textContent=data.user.email||'Admin';aNav('dashboard');}else{showLogin();}}else{showLogin();}}
window.addEventListener('load',async()=>{document.getElementById('loader').classList.add('hide');await loadAll();await checkAuth();});
</script>
